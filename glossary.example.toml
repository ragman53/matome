[meta]
lang = "en"
version = "1.0"

[[terms]]
en = "compiler"
ja = "コンパイラ"
priority = "high"  # Breaking changes trigger alerts

[[terms]]
en = "runtime"
ja = "ランタイム"
priority = "high"

[[terms]]
