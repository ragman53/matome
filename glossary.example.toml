ja = "非同期"
priority = "high"

[[terms]]
en = "closure"
ja = "クロージャ"

[[terms]]
en = "trait"
ja = "トレイト"
priority = "high"

[[terms]]
en = "ownership"
ja = "所有権"
priority = "medium"

[[terms]]
en = "borrowing"
ja = "借用"
