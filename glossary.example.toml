[[terms]]
en = "lifetime"
ja = "ライフタイム"

# Multi-language format
[[terms]]
en = "API"
translations = { ja = "API", zh = "API", ko = "API" }

# v0.2.0: Priority levels
# - high: Triggers Breaking change alert when modified
# - medium: Included in change reports
# - low/default: Normal tracking
