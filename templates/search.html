<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>検索結果: {query} - matome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    :root {
      --bg-primary: #faf8f5;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f5f1eb;
      --accent-warm: #e07a3a;
      --accent-cool: #3a6e8e;
      --text-primary: #2d2a26;
      --text-secondary: #6b6560;
      --text-muted: #9a958e;
      --border: #e5e0d8;
      --card-shadow: 0 4px 20px rgba(45, 42, 38, 0.08);
    }
    
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }
    
    .font-display {
      font-family: 'Crimson Pro', Georgia, serif;
    }
    
    .search-input {
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1.25rem;
      font-size: 1rem;
      transition: all 0.2s ease;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--accent-warm);
      box-shadow: 0 0 0 4px rgba(224, 122, 58, 0.15);
    }
    
    .search-btn {
      background: linear-gradient(135deg, var(--accent-warm), #c86a30);
      color: white;
      border-radius: 12px;
      padding: 0.875rem 1.5rem;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(224, 122, 58, 0.3);
    }
    
    .search-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(224, 122, 58, 0.4);
    }
    
    .article-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    
    .article-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(45, 42, 38, 0.12);
    }
    
    .article-card:hover .card-title {
      color: var(--accent-warm);
    }
    
    .article-card {
      animation: fadeSlideUp 0.5s ease-out backwards;
    }
    
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .domain-badge {
      background: linear-gradient(135deg, var(--accent-cool), #4a8ab0);
      color: white;
      font-size: 0.7rem;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-weight: 500;
    }
    
    .result-count {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    .highlight {
      background: linear-gradient(120deg, #ffeeba 0%, #ffeeba 100%);
      background-repeat: no-repeat;
      background-size: 100% 30%;
      background-position: 0 90%;
    }
    
    ::-webkit-scrollbar {
      width: 10px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header class="bg-white border-b border-[var(--border)] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4">
      <a href="/" class="flex items-center gap-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        ホームに戻る
      </a>
    </div>
  </header>
  
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div class="text-center mb-10">
      <h1 class="text-3xl md:text-4xl font-display font-bold mb-6">検索結果</h1>
      
      <form action="/search" method="get" class="flex gap-3 max-w-2xl mx-auto">
        <input type="text" name="q" value="{query}" placeholder="キーワードで検索..." class="search-input flex-1" autofocus>
        <button type="submit" class="search-btn flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          検索
        </button>
      </form>
    </div>
    
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-display font-semibold">検索結果を表示</h3>
      <p class="result-count">{count} 件見つかりました</p>
    </div>
    
    <div class="grid gap-5 md:grid-cols-2 lg:grid-cols-3">
      {content}
    </div>
  </main>
</body>
</html>
